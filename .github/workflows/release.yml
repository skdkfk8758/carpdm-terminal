name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Semver tag to publish (for example v0.1.0)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  release:
    runs-on: macos-15
    environment:
      name: production-release
    permissions:
      contents: write
    concurrency:
      group: release-${{ github.event.inputs.tag }}
      cancel-in-progress: false
    env:
      ROOT_DIR: ${{ github.workspace }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Validate requested tag
        id: release_meta
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag must look like v1.2.3 or v1.2.3-rc.1"
            exit 1
          fi
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            EXISTING_SHA="$(git rev-list -n 1 "$TAG")"
            if [[ "$EXISTING_SHA" != "$GITHUB_SHA" ]]; then
              echo "Existing tag $TAG points to $EXISTING_SHA, not $GITHUB_SHA"
              exit 1
            fi
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Write release xcconfig secrets
        env:
          SPARKLE_FEED_URL: ${{ secrets.SPARKLE_FEED_URL }}
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
        run: |
          cat > Config/Secrets.xcconfig <<EOF
          SPARKLE_FEED_URL = ${SPARKLE_FEED_URL}
          SPARKLE_PUBLIC_ED_KEY = ${SPARKLE_PUBLIC_ED_KEY}
          EOF

      - name: Import Developer ID certificate
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64 }}
          APPLE_DEVELOPER_ID_APPLICATION_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_P12_PASSWORD }}
        run: ./scripts/release/import_certificate.sh

      - name: Build signed archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: ./scripts/release/build_archive.sh

      - name: Create DMG
        run: ./scripts/release/create_dmg.sh

      - name: Notarize and staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
        run: ./scripts/release/notarize.sh

      - name: Generate Sparkle appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          SPARKLE_DOWNLOAD_BASE_URL: ${{ secrets.SPARKLE_DOWNLOAD_BASE_URL }}
        run: ./scripts/release/generate_appcast.sh

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          retention-days: 7
          path: |
            dist/CarpdmTerminal.dmg
            dist/CarpdmTerminal.zip
            dist/updates/appcast.xml

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.release_meta.outputs.tag }}"
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "$TAG" --target "$GITHUB_SHA" --generate-notes
          gh release upload "$TAG" \
            dist/CarpdmTerminal.dmg \
            dist/CarpdmTerminal.zip \
            dist/updates/appcast.xml \
            --clobber

      - name: Cleanup signing materials
        if: always()
        run: |
          rm -f Config/Secrets.xcconfig
          if [[ -n "${KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "$KEYCHAIN_PATH" >/dev/null 2>&1 || true
          fi
